<script>
let currentSlide=0;const slides=document.querySelectorAll('.slide-container svg');const totalSlides=slides.length;
const navBar=document.getElementById('navBar');const pageInfo=document.getElementById('pageInfo');
const prevBtn=document.getElementById('prevBtn');const nextBtn=document.getElementById('nextBtn');
let hideTimer=null;
function showSlide(n){
  if(n<0||n>=totalSlides)return;
  slides[currentSlide].classList.remove('active');
  currentSlide=n;
  slides[currentSlide].classList.add('active');
  pageInfo.textContent=(currentSlide+1)+' / '+totalSlides;
  prevBtn.disabled=currentSlide===0;
  nextBtn.disabled=currentSlide===totalSlides-1;
  showNav();
}
function goPrev(){showSlide(currentSlide-1)}
function goNext(){showSlide(currentSlide+1)}
function showNav(){
  navBar.classList.add('visible');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(function(){navBar.classList.remove('visible')},2000);
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goPrev();
  else if(e.key==='ArrowRight'||e.key==='ArrowDown')goNext();
});
document.addEventListener('mousemove',showNav);
document.addEventListener('click',showNav);
showSlide(0);
</script>
