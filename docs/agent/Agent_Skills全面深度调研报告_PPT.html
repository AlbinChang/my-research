<script>
let current = 0;
const slides = document.querySelectorAll('.slide');
const total = slides.length;
const progressBar = document.getElementById('progressBar');
const indicator = document.getElementById('pageIndicator');

function showSlide(idx) {
slides.forEach((s,i)=>s.classList.toggle('active',i===idx));
current = idx;
indicator.textContent = (idx+1)+' / '+total;
progressBar.style.width = ((idx+1)/total*100)+'%';
}

function nextSlide() { showSlide((current+1)%total); }
function prevSlide() { showSlide((current-1+total)%total); }

// 键盘事件处理：支持 ArrowRight/ArrowDown 下一页，ArrowLeft/ArrowUp 上一页
function handleKeydown(e) {
  const key = e.key;
  if(key==='ArrowRight'||key==='ArrowDown') { e.preventDefault(); nextSlide(); resetNavTimer(); }
  if(key==='ArrowLeft'||key==='ArrowUp') { e.preventDefault(); prevSlide(); resetNavTimer(); }
}
document.addEventListener('keydown', handleKeydown);

// ===== 导航栏自动隐藏 =====
const navBar = document.querySelector('.nav');
let navTimer = null;

function showNav() {
  navBar.classList.remove('hidden');
}

function hideNav() {
  navBar.classList.add('hidden');
}

function resetNavTimer() {
  showNav();
  if (navTimer) clearTimeout(navTimer);
  navTimer = setTimeout(hideNav, 2000);
}

// 鼠标移动、点击、翻页交互时显示导航栏并重置计时器
document.addEventListener('mousemove', resetNavTimer);
document.addEventListener('click', resetNavTimer);

// 页面加载后自动聚焦并启动隐藏计时器
window.addEventListener('load', () => {
  document.getElementById('slideshow').focus();
  resetNavTimer();
});
</script>
