<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960, initial-scale=1.0">
<title>2025年美国高分电影深度推荐报告</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
  }
  .deck-container {
    position: relative;
    width: 960pt;
    height: 540pt;
    overflow: hidden;
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide.active svg {
    pointer-events: none;
  }
  /* Navigation toolbar */
  .nav-toolbar {
    position: absolute;
    bottom: 12pt;
    right: 15pt;
    display: flex;
    align-items: center;
    gap: 7.5pt;
    z-index: 1000;
    opacity: 1;
    transition: opacity 0.8s ease;
  }
  .nav-toolbar.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .nav-btn {
    width: 27pt;
    height: 27pt;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.9);
    color: #333;
    font-size: 13.5pt;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    transition: all 0.2s;
  }
  .nav-btn:hover { background: #fff; transform: scale(1.1); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-indicator {
    background: rgba(255,255,255,0.85);
    padding: 3pt 9pt;
    border-radius: 10.5pt;
    font-size: 10pt;
    color: #333;
    font-weight: 500;
  }
  /* progress bar */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #e50914, #f5c518);
    z-index: 999;
    transition: width 0.5s ease;
  }
  /* Slide base backgrounds */
  .slide-bg-light {
    background: #f8f9fc;
  }
  .slide-bg-dark {
    background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
  }
  .slide-bg-accent {
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  }
</style>
</head>

<div class="progress-bar" id="progressBar" style="width: 6.67%;"></div>

<script>
(function() {
  // --- Auto-hide toolbar ---
  const toolbar = document.getElementById('toolbar');
  let hideTimer = null;

  function showToolbar() {
    toolbar.classList.remove('hidden');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      toolbar.classList.add('hidden');
    }, 2000);
  }

  document.addEventListener('mousemove', showToolbar);
  document.addEventListener('click', showToolbar);
  showToolbar();

  // --- Slide Navigation ---
  const slides = document.querySelectorAll('.slide');
  const totalSlides = slides.length;
  let current = 0;

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageIndicator = document.getElementById('pageIndicator');
  const progressBar = document.getElementById('progressBar');

  function updateSlide() {
    slides.forEach((s, i) => {
      s.classList.toggle('active', i === current);
    });
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === totalSlides - 1;
    pageIndicator.textContent = (current + 1) + ' / ' + totalSlides;
    progressBar.style.width = ((current + 1) / totalSlides * 100) + '%';
    showToolbar();
  }

  prevBtn.addEventListener('click', () => {
    if (current > 0) { current--; updateSlide(); }
  });
  nextBtn.addEventListener('click', () => {
    if (current < totalSlides - 1) { current++; updateSlide(); }
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      if (current < totalSlides - 1) { current++; updateSlide(); }
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      if (current > 0) { current--; updateSlide(); }
    }
  });

  // Touch support for mobile/tablet
  let touchStartX = 0;
  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  });
  document.addEventListener('touchend', (e) => {
    const diff = touchStartX - e.changedTouches[0].screenX;
    if (Math.abs(diff) > 50) {
      if (diff > 0 && current < totalSlides - 1) { current++; updateSlide(); }
      else if (diff < 0 && current > 0) { current--; updateSlide(); }
    }
  });

  updateSlide();
})();
</script>
