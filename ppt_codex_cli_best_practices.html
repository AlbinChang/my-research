<script>
(function(){
  let current = 1;
  const total = 16;
  const slides = document.querySelectorAll('.slide');
  const navBar = document.getElementById('navBar');
  const progressDots = document.getElementById('progressDots');
  let hideTimer = null;

  // Create progress dots
  for(let i=1;i<=total;i++){
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===1 ? ' active' : '');
    dot.title = '第'+i+'页';
    dot.addEventListener('click',()=>goTo(i));
    progressDots.appendChild(dot);
  }

  function showNav(){
    navBar.classList.add('visible');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(()=>{ if(!navBar.matches(':hover')) navBar.classList.remove('visible'); }, 2000);
  }

  function goTo(n){
    if(n<1||n>total||n===current) return;
    slides[current-1].classList.remove('active');
    slides[n-1].classList.add('active');
    current = n;
    document.getElementById('pageIndicator').textContent = current+'/'+total;
    progressDots.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current-1));
    showNav();
  }

  document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));
  document.getElementById('nextBtn').addEventListener('click',()=>goTo(current+1));
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='ArrowDown') goTo(current+1);
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(current-1);
  });
  document.addEventListener('mousemove',showNav);
  document.addEventListener('click',showNav);
})();
</script>
