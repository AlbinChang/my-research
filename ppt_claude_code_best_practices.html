<div class="toolbar" id="toolbar">
  <button class="btn" id="btnPrev" title="上一页 (←)" onclick="goPrev()">◀</button>
  <span class="page-info" id="pageInfo">1 / 18</span>
  <button class="btn" id="btnNext" title="下一页 (→)" onclick="goNext()">▶</button>
</div>

<script>
let currentPage=1;const totalPages=18;
let toolbarTimer=null;

function showPage(n){
  if(n<1||n>totalPages)return;
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  const slide=document.getElementById('slide-'+n);
  if(slide)slide.classList.add('active');
  currentPage=n;
  document.getElementById('pageInfo').textContent=n+' / '+totalPages;
  document.getElementById('btnPrev').disabled=(n===1);
  document.getElementById('btnNext').disabled=(n===totalPages);
  showToolbar();
}
function goNext(){showPage(currentPage+1);}
function goPrev(){showPage(currentPage-1);}
function showToolbar(){
  document.getElementById('toolbar').classList.add('visible');
  clearTimeout(toolbarTimer);
  toolbarTimer=setTimeout(()=>{document.getElementById('toolbar').classList.remove('visible');},2000);
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goNext();else if(e.key==='ArrowLeft')goPrev();showToolbar();});
document.addEventListener('mousemove',showToolbar);
document.addEventListener('click',showToolbar);
showToolbar();
document.getElementById('btnPrev').disabled = true;
</script>
